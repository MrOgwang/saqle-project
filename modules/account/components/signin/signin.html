@css signin @endcss
@js signin @endjs

<form method='POST' class='saqle-signin'>
	 {{ $csrf_token }}
	 <div class='flex center saqle-signin-header'>
	 	 <div>
	 	     <h2>Welcome Back</h2>
	 	     <p>Everyone missed you, sign in to continue</p>
	 	 </div>
	 </div>
	 <div class='saqle-signin-body'>
	 	 <div class='form-control-group'>
 		 	 <div class='form-control-label'>
 		 	 	 <h3 class='poppins-semibold'>Username</h3>
 		 	 </div>
 		 	 <div class='form-control-field'>
 		 	 	 <input required id='UserName' name='username' type='text'>
 		 	 </div>
 		 </div>
 		 <div class='form-control-group'>
 		 	 <div class='form-control-label'>
 		 	 	 <h3 class='poppins-semibold'>Password</h3>
 		 	 </div>
 		 	 <div class='form-control-field'>
 		 	 	 <input required id='Password' name='password' type='password'>
 		 	 </div>
 		 </div>
 		 <div class='form-control-group'>
 		 	 <button type='submit'>Login</button>
 		 </div>
	 </div>
</form>
